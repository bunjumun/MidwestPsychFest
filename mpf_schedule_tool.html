<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MPF 2026 — Schedule Tool</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Archivo:ital,wght@0,400;0,500;1,400&display=swap');
  :root {
    --bg: #0e0c09; --surface: #1a1710; --border: #2e2b22;
    --accent: #d4a843; --accent2: #7eb89a; --text: #e8e2d4;
    --muted: #7a7567; --barn: #c47a3a; --outdoor: #7eb89a;
    --missing: #9b6b6b; --confirmed: #7eb89a; --sent: #a0916b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Archivo', sans-serif; font-size: 14px; line-height: 1.6; min-height: 100vh; }

  /* HEADER */
  header { padding: 16px 32px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 20px; flex-wrap: wrap; justify-content: space-between; }
  .header-left { display: flex; align-items: baseline; gap: 14px; flex-wrap: wrap; }
  header h1 { font-family: 'Archivo Black', sans-serif; font-size: 20px; letter-spacing: 0.04em; color: var(--accent); text-transform: uppercase; }
  header .subtitle { color: var(--muted); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; }
  .header-right { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .header-btns { display: flex; gap: 8px; flex-wrap: wrap; }
  .hdr-btn { background: var(--surface); border: 1px solid var(--border); color: var(--text); font-family: 'Archivo Black', sans-serif; font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; padding: 7px 14px; border-radius: 2px; cursor: pointer; transition: all 0.15s; }
  .hdr-btn:hover { border-color: var(--accent); color: var(--accent); }
  .hdr-btn:disabled { opacity: 0.35; cursor: not-allowed; border-color: var(--border) !important; color: var(--muted) !important; }
  .hdr-btn.save { background: var(--accent); color: #0e0c09; border-color: var(--accent); }
  .hdr-btn.save:hover { opacity: 0.85; }
  .hdr-btn.active-view { border-color: var(--accent2); color: var(--accent2); }
  .hdr-btn.upload { background: rgba(126,184,154,0.15); border-color: var(--accent2); color: var(--accent2); }
  .hdr-btn.upload:hover { background: rgba(126,184,154,0.25); }
  .hdr-btn.danger { background: rgba(155,107,107,0.12); border-color: rgba(155,107,107,0.5); color: var(--missing); }
  .hdr-btn.danger:hover { background: rgba(155,107,107,0.25); border-color: var(--missing); }

  /* Indicators */
  .sync-indicator { font-size: 10px; letter-spacing: 0.07em; text-transform: uppercase; color: var(--muted); transition: color 0.4s; white-space: nowrap; }
  .sync-indicator.synced { color: var(--accent2); }

  /* LAYOUT */
  .layout { display: grid; grid-template-columns: 270px 1fr; height: calc(100vh - 57px); }
  .sidebar { border-right: 1px solid var(--border); overflow-y: auto; padding: 8px 0; }
  .main { overflow-y: auto; padding: 28px 36px; }

  /* SIDEBAR */
  .day-label { padding: 14px 18px 5px; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); font-weight: 500; }
  .band-btn { display: block; width: 100%; text-align: left; background: none; border: none; padding: 9px 18px; cursor: pointer; border-left: 3px solid transparent; transition: all 0.15s; }
  .band-btn:hover { background: var(--surface); }
  .band-btn.active { background: var(--surface); border-left-color: var(--accent); }
  .bname { display: block; font-family: 'Archivo Black', sans-serif; font-size: 10.5px; letter-spacing: 0.03em; text-transform: uppercase; color: var(--text); margin-bottom: 3px; }
  .bmeta { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
  .tag { font-size: 9px; letter-spacing: 0.07em; text-transform: uppercase; padding: 1px 5px; border-radius: 2px; font-weight: 500; white-space: nowrap; }
  .tag.barn { background: rgba(196,122,58,0.18); color: var(--barn); }
  .tag.outdoor { background: rgba(126,184,154,0.18); color: var(--outdoor); }
  .tag.confirmed { background: rgba(126,184,154,0.18); color: var(--confirmed); }
  .tag.sent { background: rgba(160,145,107,0.18); color: var(--sent); }
  .btime { font-size: 10px; color: var(--muted); }

  /* BAND DETAIL */
  .band-header { margin-bottom: 22px; padding-bottom: 18px; border-bottom: 1px solid var(--border); }
  .band-header h2 { font-family: 'Archivo Black', sans-serif; font-size: 18px; letter-spacing: 0.04em; text-transform: uppercase; color: var(--accent); margin-bottom: 8px; }
  .meta-row { display: flex; gap: 16px; flex-wrap: wrap; align-items: center; margin-bottom: 4px; }
  .meta-item { font-size: 11px; color: var(--muted); letter-spacing: 0.04em; text-transform: uppercase; }
  .meta-item strong { color: var(--text); font-weight: 500; }

  .detail-field { margin-bottom: 10px; }
  .detail-label { font-size: 10px; letter-spacing: 0.07em; text-transform: uppercase; color: var(--muted); margin-bottom: 3px; }
  .detail-value { font-size: 13px; color: var(--text); }
  .detail-value a { color: var(--accent2); text-decoration: none; }
  .detail-value a:hover { text-decoration: underline; }
  .detail-value.empty { color: var(--muted); font-style: italic; font-size: 12px; }

  .bio-text { background: var(--surface); border: 1px solid var(--border); border-radius: 3px; padding: 14px 18px; font-size: 13px; line-height: 1.7; color: var(--text); white-space: pre-wrap; margin-top: 4px; }

  .photo-preview { width: 80px; height: 80px; border-radius: 3px; object-fit: cover; border: 1px solid var(--border); margin-top: 6px; }

  /* DASHBOARD */
  .dashboard { padding: 4px 0; }
  .dash-title { font-family: 'Archivo Black', sans-serif; font-size: 13px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--accent); margin-bottom: 20px; }
  .dash-stats { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 24px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 14px 20px; min-width: 110px; }
  .stat-num { font-family: 'Archivo Black', sans-serif; font-size: 28px; color: var(--accent); }
  .stat-lbl { font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-top: 2px; }
  .dash-table { width: 100%; border-collapse: collapse; }
  .dash-table th { font-family: 'Archivo Black', sans-serif; font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); padding: 8px 12px; border-bottom: 1px solid var(--border); text-align: left; }
  .dash-table td { font-size: 12px; padding: 9px 12px; border-bottom: 1px solid rgba(46,43,34,0.5); vertical-align: middle; }
  .dash-table tr:hover td { background: rgba(255,255,255,0.02); }
  .status-pill { display: inline-block; font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase; padding: 2px 7px; border-radius: 10px; font-weight: 500; }
  .pill-confirmed { background: rgba(126,184,154,0.18); color: var(--confirmed); }
  .pill-sent { background: rgba(160,145,107,0.18); color: var(--sent); }
  .pill-pending { background: rgba(122,117,103,0.18); color: var(--muted); }

  .placeholder { display: flex; align-items: center; justify-content: center; height: 100%; color: var(--muted); font-size: 12px; letter-spacing: 0.06em; text-transform: uppercase; }

  /* EDIT FIELDS */
  .edit-section { margin-top: 18px; padding-top: 16px; border-top: 1px solid var(--border); }
  .edit-section-title { font-family: 'Archivo Black', sans-serif; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; }
  .field-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 16px; }
  .field-cell { display: flex; flex-direction: column; gap: 3px; }
  .field-cell label { font-size: 10px; letter-spacing: 0.07em; text-transform: uppercase; color: var(--muted); }
  .field-input { background: var(--surface); border: 1px solid var(--border); color: var(--text); font-family: 'Archivo', sans-serif; font-size: 12px; padding: 5px 8px; border-radius: 2px; outline: none; transition: border-color 0.15s; width: 100%; }
  .field-input:focus { border-color: var(--accent); }
  .field-textarea { background: var(--surface); border: 1px solid var(--border); color: var(--text); font-family: 'Archivo', sans-serif; font-size: 12px; padding: 8px 10px; border-radius: 2px; outline: none; transition: border-color 0.15s; width: 100%; min-height: 80px; resize: vertical; line-height: 1.5; }
  .field-textarea:focus { border-color: var(--accent); }
  .edit-btn { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 6px 14px; font-family: 'Archivo Black', sans-serif; font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; border-radius: 2px; transition: all 0.15s; }
  .edit-btn:hover { border-color: var(--accent); color: var(--accent); }
  .delete-btn { background: none; border: 1px solid rgba(155,107,107,0.4); color: var(--missing); font-family: 'Archivo Black', sans-serif; font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase; padding: 6px 14px; border-radius: 2px; cursor: pointer; transition: all 0.15s; }
  .delete-btn:hover { border-color: var(--missing); }

  .photo-section { display: flex; align-items: flex-start; gap: 14px; margin-top: 6px; }
  .photo-preview { width: 80px; height: 80px; border-radius: 3px; object-fit: cover; border: 1px solid var(--border); flex-shrink: 0; }

  /* ADD BAND MODAL */
  .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.65); z-index:200; align-items:center; justify-content:center; }
  .modal-overlay.open { display:flex; }
  .modal-box { background:var(--surface); border:1px solid var(--border); border-radius:4px; padding:28px 30px; width:420px; max-width:95vw; }
  .modal-title { font-family:'Archivo Black',sans-serif; font-size:13px; letter-spacing:.08em; text-transform:uppercase; color:var(--accent); margin-bottom:18px; }
  .modal-field { margin-bottom:12px; }
  .modal-field label { display:block; font-size:10px; letter-spacing:.07em; text-transform:uppercase; color:var(--muted); margin-bottom:4px; }
  .modal-input { background:var(--bg); border:1px solid var(--border); color:var(--text); font-family:'Archivo',sans-serif; font-size:13px; padding:6px 10px; border-radius:2px; outline:none; width:100%; transition:border-color .15s; }
  .modal-input:focus { border-color:var(--accent); }
  .modal-row { display:flex; gap:12px; }
  .modal-row .modal-field { flex:1; }
  .modal-actions { display:flex; gap:8px; margin-top:18px; }
  .modal-btn { background:var(--accent); color:#0e0c09; border:none; font-family:'Archivo Black',sans-serif; font-size:10px; letter-spacing:.08em; text-transform:uppercase; padding:8px 18px; border-radius:2px; cursor:pointer; transition:opacity .15s; }
  .modal-btn:hover { opacity:.85; }
  .modal-btn.ghost { background:var(--surface); color:var(--muted); border:1px solid var(--border); }
  .modal-btn.ghost:hover { color:var(--text); border-color:var(--muted); }

  /* EMPTY STATE */
  .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 16px; text-align: center; padding: 40px; }
  .empty-state .icon { font-size: 48px; opacity: 0.4; }
  .empty-state .msg { color: var(--muted); font-size: 13px; letter-spacing: 0.04em; max-width: 400px; line-height: 1.7; }
  .empty-state .msg strong { color: var(--text); }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body data-repo="bunjumun/MidwestPsychFest">
<header>
  <div class="header-left">
    <h1>Midwest Psych Fest 2026</h1>
    <span class="subtitle">Schedule Tool</span>
  </div>
  <div class="header-right">
    <span class="sync-indicator" id="syncIndicator"></span>
    <div class="header-btns">
      <button class="hdr-btn" id="dashBtn" onclick="toggleDashboard()">Dashboard</button>
      <button class="hdr-btn" onclick="openAddBandModal()">+ Add Band</button>
      <button class="hdr-btn upload" id="syncSheetBtn" onclick="syncFromSheet()" title="Pull latest schedule directly from the Google Sheet">Sync from Sheet</button>
      <label class="hdr-btn" title="Upload a CSV exported from Google Sheets to replace all schedule data">Upload CSV <input type="file" accept=".csv" style="display:none" id="csvInput" onchange="handleCSVUpload(event)"></label>
      <button class="hdr-btn danger" onclick="clearAllBands()" title="Remove all bands from the tool (does not affect live site until you push)">Clear All</button>
      <button class="hdr-btn" onclick="exportCSV()" title="Export current schedule as CSV">Export CSV</button>
      <button class="hdr-btn" id="pushLiveBtn" onclick="pushToLiveSite()" title="Commit current schedule to data/schedule.json on GitHub (updates live site in ~60s)">Push to Live Site</button>
      <button class="hdr-btn" id="schedVisBtn" onclick="toggleScheduleVisibility()" title="Show or hide the schedule on the public site">Schedule: Public</button>
    </div>
  </div>
</header>

<div class="layout">
  <div class="sidebar" id="sidebar"></div>
  <div class="main" id="main"><div class="placeholder">&larr; Select a band or upload a CSV</div></div>
</div>

<!-- ADD BAND MODAL -->
<div class="modal-overlay" id="addBandOverlay">
  <div class="modal-box">
    <div class="modal-title">Add Band</div>
    <div class="modal-field">
      <label>Band / Act Name</label>
      <input class="modal-input" id="abName" type="text" placeholder="e.g. SUNGRAZER" />
    </div>
    <div class="modal-row">
      <div class="modal-field">
        <label>Stage</label>
        <select class="modal-input" id="abStage">
          <option value="Outdoor Stage A">Outdoor Stage A</option>
          <option value="Outdoor Stage B">Outdoor Stage B</option>
          <option value="Barn Stage">Barn Stage</option>
        </select>
      </div>
      <div class="modal-field">
        <label>Day</label>
        <select class="modal-input" id="abDay">
          <option value="Friday, May 8">Friday, May 8</option>
          <option value="Saturday, May 9">Saturday, May 9</option>
        </select>
      </div>
    </div>
    <div class="modal-row">
      <div class="modal-field">
        <label>Set Time (24h)</label>
        <input class="modal-input" id="abTime" type="time" value="18:00" />
      </div>
    </div>
    <div class="modal-actions">
      <button class="modal-btn" onclick="saveNewBand()">Add Band</button>
      <button class="modal-btn ghost" onclick="closeAddBandModal()">Cancel</button>
    </div>
  </div>
</div>

<script>
// ─── STATE ───────────────────────────────────────────────────────────────────
let bands = [];     // array of schedule entry objects
let currentIdx = null;
let dashboardOpen = false;

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function escHtml(str) { return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escAttr(str) { return String(str).replace(/"/g,'&quot;'); }
function slugify(str) { return String(str).toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, ''); }

function parseTime12to24(str) {
  const m = String(str).match(/^(\d+):(\d+)\s*(AM|PM)$/i);
  if (!m) return '00:00';
  let h = parseInt(m[1]), min = m[2], period = m[3].toUpperCase();
  if (period === 'AM' && h === 12) h = 0;
  if (period === 'PM' && h !== 12) h += 12;
  return `${String(h).padStart(2,'0')}:${min}`;
}

function parse24to12(str) {
  const m = str.match(/^(\d+):(\d+)$/);
  if (!m) return str;
  let h = parseInt(m[1]), min = m[2];
  const period = h >= 12 ? 'PM' : 'AM';
  if (h === 0) h = 12;
  else if (h > 12) h -= 12;
  return `${h}:${min} ${period}`;
}

function dateToISO(dayStr) {
  const months = {January:'01',February:'02',March:'03',April:'04',May:'05',June:'06',
                  July:'07',August:'08',September:'09',October:'10',November:'11',December:'12'};
  const m = String(dayStr).match(/(\w+),\s+(\w+)\s+(\d+)/);
  if (!m) return '';
  return `2026-${months[m[2]] || '00'}-${String(parseInt(m[3])).padStart(2,'0')}`;
}

// Convert ISO date string or Date-like value to display string "Friday, May 8"
function normalizeDayStr(raw) {
  const s = String(raw || '').trim();
  // Already a display string like "Friday, May 8"
  if (/^\w+,\s+\w+\s+\d+$/.test(s)) return s;
  // ISO date: "2026-05-08" or "2026-05-08T04:00:00.000Z"
  const isoMatch = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (isoMatch) {
    // Parse as local date (avoid timezone shift by using parts directly)
    const y = parseInt(isoMatch[1]), m = parseInt(isoMatch[2]) - 1, d = parseInt(isoMatch[3]);
    const dt = new Date(y, m, d);
    const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    return `${days[dt.getDay()]}, ${months[dt.getMonth()]} ${dt.getDate()}`;
  }
  return s || '';
}

// Festival sort key: 12am-5:59am treated as late night (sorts after 11:59pm)
function festKey(t12) {
  const t24 = parseTime12to24(t12);
  const [h, m] = t24.split(':').map(Number);
  return (h < 6 ? h + 24 : h) * 60 + m;
}

// ─── CSV PARSING ─────────────────────────────────────────────────────────────
function splitCsvLine(line) {
  const result = []; let cur = '', inQuote = false;
  for (const ch of line) {
    if (ch === '"') inQuote = !inQuote;
    else if (ch === ',' && !inQuote) { result.push(cur); cur = ''; }
    else cur += ch;
  }
  result.push(cur);
  return result;
}

function parseCSV(csvText) {
  const lines = csvText.trim().split('\n').filter(l => l.trim());
  if (lines.length < 2) return [];
  const rawHeaders = splitCsvLine(lines[0]);
  const headers = rawHeaders.map(h => h.replace(/"/g, '').trim().toLowerCase());

  // Map common header variations to our field names
  const colMap = {};
  headers.forEach((h, i) => {
    if (/band|artist|act|name/i.test(h) && colMap.band === undefined)  colMap.band = i;
    else if (/date|day/i.test(h) && colMap.day === undefined)           colMap.day = i;
    else if (/time|start/i.test(h) && colMap.time === undefined)        colMap.time = i;
    else if (/stage/i.test(h) && colMap.stage === undefined)            colMap.stage = i;
    else if (/^type$/i.test(h))                                         colMap.type = i;
    else if (/email/i.test(h) && !/body/i.test(h) && colMap.email === undefined) colMap.email = i;
    else if (/status/i.test(h))                                         colMap.status = i;
    else if (/social/i.test(h))                                         colMap.social = i;
    else if (/stream/i.test(h))                                         colMap.streaming = i;
    else if (/^bio/i.test(h))                                           colMap.bio = i;
    else if (/photo|image/i.test(h))                                    colMap.image = i;
  });

  // If no header matched "band", assume first column is the band name
  if (colMap.band === undefined) colMap.band = 0;

  const entries = [];
  for (let r = 1; r < lines.length; r++) {
    const vals = splitCsvLine(lines[r]).map(v => v.replace(/"/g, '').trim());
    const bandName = vals[colMap.band] || '';
    if (!bandName) continue;

    const stage = vals[colMap.stage] || 'Outdoor Stage A';
    const isBarn = stage.toLowerCase().includes('barn');
    const rawTime = vals[colMap.time] || '';
    // Accept either 12h ("5:00 PM") or 24h ("17:00") format
    let timeDisplay = rawTime;
    if (/^\d{1,2}:\d{2}$/.test(rawTime) && !rawTime.match(/[APap]/)) {
      timeDisplay = parse24to12(rawTime);
    }
    const day = normalizeDayStr(vals[colMap.day]);

    entries.push({
      id:               `${slugify(bandName)}-${slugify(day.split(',')[0] || 'tbd')}`,
      band:             bandName.toUpperCase(),
      stage:            stage,
      stage_id:         slugify(stage),
      day:              day,
      date:             dateToISO(day),
      set_time:         parseTime12to24(timeDisplay),
      set_time_display: timeDisplay,
      status:           vals[colMap.status] || 'pending',
      bio:              vals[colMap.bio] || '',
      social:           vals[colMap.social] ? { link: vals[colMap.social] } : {},
      streaming:        vals[colMap.streaming] || '',
      image:            vals[colMap.image] || '',
    });
  }
  return entries;
}

// ─── CSV UPLOAD ──────────────────────────────────────────────────────────────
function handleCSVUpload(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const parsed = parseCSV(e.target.result);
    if (parsed === null) return; // error already shown
    if (parsed.length === 0) {
      // Show first line of CSV to help debug
      const firstLine = e.target.result.trim().split('\n')[0] || '(empty)';
      alert(`No bands found in CSV.\n\nHeaders detected: ${firstLine}\n\nCheck that the file has data rows and a Band/Name column.`);
      return;
    }
    const msg = bands.length > 0
      ? `Replace all ${bands.length} current bands with ${parsed.length} bands from CSV?`
      : `Load ${parsed.length} bands from CSV?`;
    if (!confirm(msg)) return;
    bands = parsed;
    saveToStorage();
    currentIdx = null;
    dashboardOpen = false;
    buildSidebar();
    document.getElementById('main').innerHTML = `<div class="placeholder">${bands.length} bands loaded from CSV &mdash; select a band or Push to Live Site</div>`;
    flash('CSV loaded');
  };
  reader.readAsText(file);
  event.target.value = '';
}

// ─── SYNC FROM GOOGLE SHEET ──────────────────────────────────────────────────
const SHEET_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzNeKKu9nAKNnXmYztU-C83xANb4wVa9FlDF6yC8xW7pt2Wrxdl7uGAG3xowqTQ0Uga/exec';
const SHEET_ID         = '1nyiG_ksiQPQPEVnoyO1vUc1FUGy-9X9Jb-67d0IQKhI';
const SHEET_TAB        = 'Bands';

async function syncFromSheet() {
  const btn = document.getElementById('syncSheetBtn');
  if (btn) { btn.disabled = true; btn.textContent = 'Fetching…'; }

  try {
    const url = `${SHEET_SCRIPT_URL}?sheet=${encodeURIComponent(SHEET_TAB)}&sheetId=${encodeURIComponent(SHEET_ID)}&_=${Date.now()}`;
    const res = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const json = await res.json();
    if (!json.ok) throw new Error(json.error || 'Script error');

    const [headerRow, ...dataRows] = json.rows;
    if (!headerRow || dataRows.length === 0) {
      alert('Sheet returned no data rows.');
      return;
    }

    // Map header names to column indices
    const headers = headerRow.map(h => String(h).trim().toLowerCase());
    const col = {};
    headers.forEach((h, i) => {
      if (/band|artist|act|name/i.test(h) && col.band === undefined)   col.band = i;
      else if (/date|day/i.test(h) && col.day === undefined)            col.day = i;
      else if (/time|start/i.test(h) && col.time === undefined)         col.time = i;
      else if (/stage/i.test(h) && col.stage === undefined)             col.stage = i;
      else if (/^type$/i.test(h))                                       col.type = i;
      else if (/email/i.test(h) && !/body/i.test(h) && col.email === undefined) col.email = i;
      else if (/status/i.test(h))                                       col.status = i;
      else if (/social/i.test(h))                                       col.social = i;
      else if (/stream/i.test(h))                                       col.streaming = i;
      else if (/^bio/i.test(h))                                         col.bio = i;
      else if (/photo|image/i.test(h))                                  col.image = i;
    });

    // Fall back: if no header matched "band", assume col A
    if (col.band === undefined) col.band = 0;

    const entries = [];
    for (const row of dataRows) {
      const bandName = String(row[col.band] || '').trim();
      if (!bandName) continue;

      const stage = String(row[col.stage] ?? 'Outdoor Stage A').trim();
      const rawTime = String(row[col.time] ?? '').trim();
      let timeDisplay = rawTime;
      // Handle Google Sheets Date objects (come as ISO strings)
      if (rawTime && rawTime.includes('T')) {
        const d = new Date(rawTime);
        if (!isNaN(d)) timeDisplay = parse24to12(`${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`);
      } else if (/^\d{1,2}:\d{2}$/.test(rawTime)) {
        timeDisplay = parse24to12(rawTime);
      }
      const day = normalizeDayStr(row[col.day]);

      entries.push({
        id:               `${slugify(bandName)}-${slugify(day.split(',')[0] || 'tbd')}`,
        band:             bandName.toUpperCase(),
        stage:            stage,
        stage_id:         slugify(stage),
        day:              day,
        date:             dateToISO(day),
        set_time:         parseTime12to24(timeDisplay),
        set_time_display: timeDisplay,
        status:           String(row[col.status] ?? 'pending').trim() || 'pending',
        bio:              String(row[col.bio] ?? '').trim(),
        social:           row[col.social] ? { link: String(row[col.social]).trim() } : {},
        streaming:        String(row[col.streaming] ?? '').trim(),
        image:            String(row[col.image] ?? '').trim(),
      });
    }

    if (entries.length === 0) {
      alert('No bands found in sheet. Check that the Bands tab has data.');
      return;
    }

    const msg = bands.length > 0
      ? `Replace all ${bands.length} current bands with ${entries.length} bands from Google Sheet?`
      : `Load ${entries.length} bands from Google Sheet?`;
    if (!confirm(msg)) return;

    bands = entries;
    saveToStorage();
    currentIdx = null;
    dashboardOpen = false;
    buildSidebar();
    document.getElementById('main').innerHTML = `<div class="placeholder">${bands.length} bands synced from Google Sheet &mdash; select a band or Push to Live Site</div>`;
    flash('Sheet synced');

  } catch(e) {
    alert(`✗ Sheet sync failed: ${e.message}`);
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = 'Sync from Sheet'; }
  }
}

// ─── CLEAR ALL ───────────────────────────────────────────────────────────────
function clearAllBands() {

// ─── STORAGE ─────────────────────────────────────────────────────────────────
function saveToStorage() {
  try { localStorage.setItem('mpf_schedule_tool', JSON.stringify(bands)); } catch(e) {}
}

// Load schedule from the live public site (data/schedule.json on GitHub)
async function loadFromLiveSite() {
  try {
    const repo = (document.body && document.body.dataset.repo) || 'bunjumun/MidwestPsychFest';
    const res = await fetch(`https://raw.githubusercontent.com/${repo}/main/data/schedule.json?t=${Date.now()}`);
    if (!res.ok) return false;
    const data = await res.json();
    if (Array.isArray(data) && data.length > 0) {
      bands = data.map(b => ({ ...b, day: normalizeDayStr(b.day), date: dateToISO(normalizeDayStr(b.day)) || b.date }));
      saveToStorage();
      return true;
    }
  } catch(e) {}
  // Fallback: try local data/schedule.json (for local dev)
  try {
    const res = await fetch('data/schedule.json?t=' + Date.now());
    if (!res.ok) return false;
    const data = await res.json();
    if (Array.isArray(data) && data.length > 0) {
      bands = data.map(b => ({ ...b, day: normalizeDayStr(b.day), date: dateToISO(normalizeDayStr(b.day)) || b.date }));
      saveToStorage();
      return true;
    }
  } catch(e) {}
  return false;
}

function flash(msg) {
  const el = document.getElementById('syncIndicator');
  if (!el) return;
  el.textContent = '✓ ' + msg;
  el.classList.add('synced');
  clearTimeout(el._t);
  el._t = setTimeout(() => { el.textContent = `${bands.length} bands`; el.classList.remove('synced'); }, 2500);
}

// ─── SIDEBAR ─────────────────────────────────────────────────────────────────
const sidebarEl = document.getElementById('sidebar');

function buildSidebar() {
  if (bands.length === 0) {
    sidebarEl.innerHTML = '<div style="padding:20px 18px;color:var(--muted);font-size:11px;letter-spacing:0.06em;text-transform:uppercase;">No bands loaded</div>';
    return;
  }
  const byDate = {};
  bands.forEach((b, i) => {
    const date = b.day || 'TBD';
    if (!byDate[date]) byDate[date] = [];
    byDate[date].push(i);
  });

  sidebarEl.innerHTML = '';
  Object.entries(byDate).forEach(([date, indices]) => {
    indices.sort((a, b) => festKey(bands[a].set_time_display || '12:00 PM') - festKey(bands[b].set_time_display || '12:00 PM'));

    const dl = document.createElement('div');
    dl.className = 'day-label';
    dl.textContent = date;
    sidebarEl.appendChild(dl);

    indices.forEach(i => {
      const b = bands[i];
      const isBarn = (b.stage_id || '').includes('barn') || (b.stage || '').toLowerCase().includes('barn');
      const stageType = isBarn ? 'barn' : 'outdoor';
      const btn = document.createElement('button');
      btn.className = 'band-btn' + (currentIdx === i ? ' active' : '');
      let tags = `<span class="tag ${stageType}">${isBarn ? 'Barn' : 'Outdoor'}</span>`;
      if (b.status === 'confirmed') tags += `<span class="tag confirmed">Confirmed</span>`;
      else if (b.status === 'sent') tags += `<span class="tag sent">Sent</span>`;
      btn.innerHTML = `<span class="bname">${escHtml(b.band)}</span><div class="bmeta">${tags}<span class="btime">${escHtml(b.set_time_display || '')}</span></div>`;
      btn.addEventListener('click', () => {
        dashboardOpen = false;
        document.getElementById('dashBtn').classList.remove('active-view');
        selectBand(i);
      });
      sidebarEl.appendChild(btn);
    });
  });
}

  if (dashboardOpen) { currentIdx = null; buildSidebar(); renderDashboard(); }
  else document.getElementById('main').innerHTML = '<div class="placeholder">&larr; Select a band</div>';

function renderDashboard() {
  const total = bands.length;
  const confirmed = bands.filter(b => b.status === 'confirmed').length;
  const sent = bands.filter(b => b.status === 'sent').length;
  const pending = total - confirmed - sent;

  // Count by day
  const byDay = {};
  bands.forEach(b => {
    const d = b.day || 'TBD';
    byDay[d] = (byDay[d] || 0) + 1;
  });

  let rows = '';
  bands.forEach((b, i) => {
    let pillClass = 'pill-pending', pillText = 'Pending';
    if (b.status === 'confirmed') { pillClass = 'pill-confirmed'; pillText = 'Confirmed'; }
    else if (b.status === 'sent') { pillClass = 'pill-sent'; pillText = 'Sent'; }
    const isBarn = (b.stage_id || '').includes('barn') || (b.stage || '').toLowerCase().includes('barn');
    rows += `<tr>
      <td><strong style="font-size:11px;cursor:pointer;" onclick="selectBand(${i})">${escHtml(b.band)}</strong></td>
      <td style="color:var(--muted);font-size:11px">${escHtml(b.day || 'TBD')}</td>
      <td style="font-size:11px">${escHtml(b.set_time_display || '')}</td>
      <td><span class="tag ${isBarn ? 'barn' : 'outdoor'}" style="font-size:9px">${isBarn ? 'Barn' : 'Outdoor'}</span></td>

        <div class="stat-card"><div class="stat-num">${total}</div><div class="stat-lbl">Total Bands</div></div>

}

// ─── EDIT HANDLERS ───────────────────────────────────────────────────────────
function editField(idx, field, val) {
  bands[idx][field] = val;
  if (field === 'stage') {
    bands[idx].stage_id = slugify(val);
  }
  if (field === 'day') {
    bands[idx].date = dateToISO(val);
    bands[idx].id = `${slugify(bands[idx].band)}-${slugify(val.split(',')[0])}`;
  }
  if (field === 'band') {
    bands[idx].id = `${slugify(val)}-${slugify((bands[idx].day || '').split(',')[0])}`;
  }
  saveToStorage();
  // Update sidebar for name/time/status/day changes
  if (['band','day','status','stage'].includes(field)) buildSidebar();
}

function editTime(idx, time24) {
  bands[idx].set_time = time24;
  bands[idx].set_time_display = parse24to12(time24);
  saveToStorage();
  buildSidebar();
}

function editSocial(idx, val) {
  bands[idx].social = val ? { link: val } : {};
  saveToStorage();
}

function editPhoto(idx, url) {
  bands[idx].image = url;
  saveToStorage();
  const img = document.querySelector('.photo-preview');
  if (img) { img.src = url; img.style.display = url ? '' : 'none'; }
}

function openAddBandModal() {

function closeAddBandModal() {

function saveNewBand() {
  const name = document.getElementById('abName').value.trim().toUpperCase();
  const stage = document.getElementById('abStage').value;
  const day = document.getElementById('abDay').value;
  const time24 = document.getElementById('abTime').value || '18:00';

  bands.push({
    id:               `${slugify(name)}-${slugify(day.split(',')[0])}`,
    band:             name,
    stage:            stage,
    stage_id:         slugify(stage),
    day:              day,
    date:             dateToISO(day),
    set_time:         time24,
    set_time_display: parse24to12(time24),
    status:           'pending',
    bio:              '',
    social:           {},
    streaming:        '',
    image:            '',
  });
  closeAddBandModal();
  saveToStorage();
  buildSidebar();
  selectBand(bands.length - 1);

document.getElementById('addBandOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeAddBandModal();
});

function deleteBand(idx) {
  if (!confirm(`Delete "${bands[idx].band}"?`)) return;
  bands.splice(idx, 1);
  saveToStorage();
  currentIdx = null;
  buildSidebar();
  document.getElementById('main').innerHTML = '<div class="placeholder">&larr; Select a band</div>';
  flash(`${bands.length} bands`);
}

// ─── EXPORT CSV ──────────────────────────────────────────────────────────────
// Matches Google Sheet column layout: A=Band, B=Date, C=Time, D=Stage, E=Type,
// F=Email, G=Status, H=Social, I=Streaming, J=Bio, K=Photo URL, L=Email Body
function exportCSV() {
  if (bands.length === 0) { alert('No bands to export.'); return; }
  const headers = ['Band','Date','Time','Stage','Type','Email','Status','Social','Streaming','Bio','Photo URL','Email Body'];
  const rows = bands.map(b => {
    const social = (b.social && b.social.link) ? b.social.link : '';
    const isBarn = (b.stage_id || '').includes('barn') || (b.stage || '').toLowerCase().includes('barn');
    return [
      b.band || '',
      b.day || '',
      b.set_time_display || '',
      b.stage || '',
      isBarn ? 'barn' : 'outdoor',
      '',  // Email — not stored in tool
      b.status || '',
      social,
      b.streaming || '',
      (b.bio || '').replace(/\r?\n/g, ' '),
      (b.image && !b.image.startsWith('data:')) ? b.image : '',
      '',  // Email Body — not stored in tool
    ].map(v => `"${String(v).replace(/"/g,'""')}"`).join(',');
  });
  const csv = [headers.join(','), ...rows].join('\r\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob); a.download = 'mpf_schedule.csv'; a.click();
  URL.revokeObjectURL(a.href);
}

// ─── AUTH: ensure PAT is loaded before GitHub operations ────────────────────
async function ensurePat() {
  if (typeof ghPat === 'function' && ghPat()) return true;
  // Try to unlock from encrypted storage
  if (typeof ghUnlockPat !== 'function') throw new Error('GitHub sync not available.');
  const pw = prompt('Enter admin password to push changes:');
  if (!pw) return false;
  try {
    await ghUnlockPat(pw);
    return true;
  } catch(e) {
    alert(e.message);
    return false;
  }
}

// ─── PUSH TO LIVE SITE ──────────────────────────────────────────────────────
async function pushToLiveSite() {
  const btn = document.getElementById('pushLiveBtn');
  if (btn) { btn.disabled = true; btn.textContent = 'Pushing…'; }

  try {
    if (typeof ghPutJSON !== 'function') throw new Error('GitHub sync not available.');
    if (!(await ensurePat())) return;

    if (bands.length === 0) {
      // Empty schedule — push empty array and auto-hide schedule
      if (!confirm('No bands loaded. Push empty schedule and show "Schedule Coming Soon" on the public site?')) return;
      await ghPutJSON('data/schedule.json', [], 'admin: clear schedule');
      // Auto-hide schedule on public site
      const info = _infoJsonCache || {};
      info.schedule_hidden = true;
      await ghPutJSON('data/info.json', info, 'admin: hide schedule (empty)');
      _scheduleHidden = true;
      _infoJsonCache = info;
      updateSchedVisBtn();
      // Clear public schedule cache so schedule page fetches fresh data
      try { localStorage.removeItem('mpf_schedule'); } catch(e) {}
      flash('Live (hidden)');
      alert('✓ Schedule cleared and hidden. Public site will show "Schedule Coming Soon" (~60s).');
      return;
    }

    // Build public schedule — strip any private fields
    const schedule = bands.map(b => ({
      id:               b.id || `${slugify(b.band)}-${slugify((b.day || '').split(',')[0])}`,
      band:             b.band,
      stage:            b.stage,
      stage_id:         b.stage_id || slugify(b.stage),
      day:              b.day,
      date:             b.date || dateToISO(b.day),
      set_time:         b.set_time || parseTime12to24(b.set_time_display),
      set_time_display: b.set_time_display,
      status:           b.status || 'pending',
      bio:              b.bio || '',
      social:           b.social || {},
      streaming:        b.streaming || '',
      image:            (b.image && !b.image.startsWith('data:')) ? b.image : '',
    }));

    await ghPutJSON('data/schedule.json', schedule, 'feat: update schedule via schedule tool');
    // Clear public schedule cache so schedule page fetches fresh data
    try { localStorage.removeItem('mpf_schedule'); } catch(e) {}
    flash('Live');
    alert(`✓ ${schedule.length} bands pushed to live site. Changes appear in ~60 seconds.`);
  } catch(e) {
    alert(`✗ Push failed: ${e.message}\n\nMake sure your GitHub PAT is configured in admin settings.`);
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = 'Push to Live Site'; }
  }
}

// ─── SCHEDULE VISIBILITY TOGGLE ─────────────────────────────────────────────
let _infoJsonCache = null;
let _scheduleHidden = false;

async function loadScheduleVisibility() {
  try {
    const repo = (document.body && document.body.dataset.repo) || 'bunjumun/MidwestPsychFest';
    const data = await fetch('https://raw.githubusercontent.com/' +
      repo + '/main/data/info.json?t=' + Date.now())
      .then(r => r.ok ? r.json() : null);
    if (data) {
      _infoJsonCache = data;
      _scheduleHidden = !!data.schedule_hidden;
      updateSchedVisBtn();

}

function updateSchedVisBtn() {
  const btn = document.getElementById('schedVisBtn');
  if (!btn) return;
  if (_scheduleHidden) {
    btn.textContent = 'Schedule: Hidden';
    btn.style.borderColor = 'var(--missing)';
    btn.style.color = 'var(--missing)';
  } else {
    btn.textContent = 'Schedule: Public';
    btn.style.borderColor = '';
    btn.style.color = '';
  }
}

async function toggleScheduleVisibility() {
  const btn = document.getElementById('schedVisBtn');
  if (!btn) return;
  const newHidden = !_scheduleHidden;
  const label = newHidden ? 'hidden ("Full Schedule Coming Soon")' : 'public (live schedule visible)';
  if (!confirm(`Set schedule to: ${label}?\n\nThis updates data/info.json on GitHub (~60s to take effect).`)) return;
  btn.disabled = true; btn.textContent = 'Pushing…';
  try {
    if (typeof ghPutJSON !== 'function') throw new Error('GitHub sync not available.');
    if (!(await ensurePat())) return;
    const info = _infoJsonCache || {};
    info.schedule_hidden = newHidden;
    await ghPutJSON('data/info.json', info, (newHidden ? 'admin: hide schedule' : 'admin: show schedule'));
    _scheduleHidden = newHidden;
    _infoJsonCache = info;
    updateSchedVisBtn();
    alert(newHidden
      ? '✓ Schedule hidden — visitors will see "Full Schedule Coming Soon." (~60s)'
      : '✓ Schedule now public — live schedule grid visible to visitors (~60s)');
  } catch(e) {
    alert('✗ Failed: ' + e.message);
  } finally {
    btn.disabled = false;
    updateSchedVisBtn();
  }
}

// ─── INIT ────────────────────────────────────────────────────────────────────
(async () => {
  const el = document.getElementById('syncIndicator');
  if (el) el.textContent = 'Loading…';

  const loaded = await loadFromLiveSite();
  if (loaded) {
    buildSidebar();
    if (el) el.textContent = `${bands.length} bands (from live site)`;
  } else {
    buildSidebar();
    if (el) el.textContent = '';
    document.getElementById('main').innerHTML = '<div class="empty-state"><div class="icon">📋</div><div class="msg">Could not load schedule from live site. Upload a CSV from your <strong>Google Sheet</strong> to get started.</div></div>';
  }
  loadScheduleVisibility();
})();
</script>
<script src="assets/js/github-sync.js"></script>
