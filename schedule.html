<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Schedule — Midwest Psych Fest 2026</title>
  <link rel="stylesheet" href="assets/css/main.css" />
  <link rel="stylesheet" href="assets/css/schedule.css" />
</head>
<body>

  <!-- NAV -->
  <nav class="site-nav">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo" data-info="name-nav">Midwest <span>Psych</span> Fest</a>
      <button class="nav-hamburger" id="navToggle" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
      <ul class="nav-links" id="navLinks">
        <li><a href="index.html">Home</a></li>
        <li><a href="schedule.html" class="active">Schedule</a></li>
        <li><a href="map.html">Map</a></li>
      </ul>
    </div>
  </nav>

  <!-- Page Banner (admin-managed) -->
  <div class="page-banner" data-slot="schedule-banner"></div>

  <!-- PAGE -->
  <div class="page-content">
    <h1 class="section-title" style="margin-top:16px;">Schedule</h1>
    <p class="section-subtitle">
      <span data-info="dates-short">May 8–9, 2026</span> · <span data-info="location">Central Ohio</span>
    </p>

    <!-- Controls -->
    <div class="schedule-controls">
      <div class="day-toggle">
        <!-- Text set dynamically by schedule.js from info.json dates -->
        <button class="day-btn active" data-day="1">Friday, May 8</button>
        <button class="day-btn"        data-day="2">Saturday, May 9</button>
        <button class="day-btn all"    data-day="all">All Days</button>
      </div>
      <div class="stage-filters">
        <span class="stage-filter-label">Stage:</span>
        <button class="stage-btn active" data-stage="all">All Stages</button>
        <!-- Stage buttons populated dynamically by schedule.js -->
      </div>
    </div>

    <!-- Schedule grid -->
    <div class="schedule-columns" id="scheduleGrid">
      <div class="schedule-empty">Loading schedule…</div>
    </div>
  </div>

  <!-- FOOTER -->
  <footer class="site-footer">
    <a href="#" data-info="instagram">Instagram</a> &nbsp;·&nbsp;
    <a href="#" data-info="facebook">Facebook</a>
    <div style="margin-top:12px;font-size:0.8rem;">© 2026 Midwest Psych Fest</div>
  </footer>

  <a id="ticketBtn" class="ticket-btn" href="#" target="_blank" rel="noopener" style="display:none">🎟 Get Tickets</a>
  <script src="assets/js/site-info.js"></script>
  <script src="assets/js/stages.js"></script>
  <script src="assets/js/image-blocks.js"></script>
  <script src="assets/js/schedule.js"></script>
  <div id="widget-slot" style="display:none"></div>
  <script src="assets/js/widgets.js"></script>
</body>
</html>
